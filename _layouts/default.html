<!DOCTYPE html>
<html lang="en">
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <header class="site-header">
        <nav>
            <a href="{{ '/' | relative_url }}" class="site-title">Matteo Barbieri</a>
            <div class="nav-links">
                <a href="{{ '/projects/' | relative_url }}">Projects</a>
                <a href="{{ '/blog/' | relative_url }}">Blog</a>
                <a href="{{ '/about/' | relative_url }}">About</a>
            </div>
        </nav>
    </header>
    
    <main class="page-content">
        {{ content }}
    </main>
    
    <footer class="site-footer">
        <p>&copy; {{ site.time | date: '%Y' }} Matteo Barbieri. <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a></p>
    </footer>
</body>
</html>
