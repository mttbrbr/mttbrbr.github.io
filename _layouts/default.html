<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        }
      };
    </script>
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <header class="site-header">
        <nav>
            <a href="{{ '/' | relative_url }}" class="site-title">Matteo Barbieri</a>
            <div class="nav-links">
                <a href="{{ '/projects/' | relative_url }}">Projects</a>
                <a href="{{ '/blog/' | relative_url }}">Blog</a>
                <a href="{{ '/about/' | relative_url }}">About</a>
            </div>
        </nav>
    </header>
    
    <main class="page-content">
        {{ content }}
    </main>
    
    <footer class="site-footer">
        <p>&copy; {{ site.time | date: '%Y' }} Matteo Barbieri. <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a></p>
    </footer>

    <script>
        // Reading Progress Bar
        document.addEventListener('scroll', function() {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
            const clientHeight = document.documentElement.clientHeight;
            const scrolled = (scrollTop / (scrollHeight - clientHeight)) * 100;
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) {
                progressBar.style.width = scrolled + '%';
            }
        });

        // Code Block Copy Button
        document.addEventListener('DOMContentLoaded', function() {
            const blocks = document.querySelectorAll('pre');
            blocks.forEach((pre) => {
                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.textContent = 'Copy';
                
                button.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    const text = code ? code.innerText : pre.innerText;
                    
                    navigator.clipboard.writeText(text).then(() => {
                        button.textContent = 'Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy';
                            button.classList.remove('copied');
                        }, 2000);
                    });
                });
                
                pre.appendChild(button);
            });
        });
    </script>
</body>
</html>
